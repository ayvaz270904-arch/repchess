<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Rep Chess — Личный кабинет</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #0f1117);
    --card: var(--tg-theme-secondary-bg-color, #1a1d27);
    --text: var(--tg-theme-text-color, #e8e8e8);
    --hint: var(--tg-theme-hint-color, #8a8f9c);
    --accent: var(--tg-theme-button-color, #C94A42);
    --accent-text: var(--tg-theme-button-text-color, #ffffff);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, system-ui, 'Segoe UI', sans-serif;
    padding: 16px; min-height: 100vh; font-size: 15px;
  }
  .header { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
  .header .logo { font-size: 1.5rem; }
  .header h1 { font-size: 1.15rem; font-weight: 800; }
  .card {
    background: var(--card); border-radius: 14px; padding: 16px 18px; margin-bottom: 12px;
  }
  .card h2 { font-size: .95rem; font-weight: 700; margin-bottom: 8px; }
  .muted { color: var(--hint); font-size: .85rem; }
  .big { font-size: 1.6rem; font-weight: 800; color: var(--accent); }
  .center { text-align: center; padding: 40px 16px; }
  .spinner {
    width: 28px; height: 28px; border: 3px solid var(--card);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .err { color: #ef4444; }
  .btn {
    display: inline-block; background: var(--accent); color: var(--accent-text);
    padding: 10px 18px; border-radius: 10px; font-weight: 700; border: none;
    cursor: pointer; font-size: .9rem; text-decoration: none; margin-top: 10px;
  }
</style>
</head>
<body>
  <div id="app">
    <div class="center">
      <div class="spinner"></div>
      <div class="muted">Загружаю ваш кабинет…</div>
    </div>
  </div>

<script>
// Бэкенд = тот же проект Apps Script, что и бот (doGet)
const BACKEND = 'https://script.google.com/macros/s/AKfycbymBB1BkAnqLi_uLt9M1rVJ-rFGa0fK225hw-HvlhxgxsbVO4K5gka44FTFzYLss-tVZg/exec';

const tg = window.Telegram ? window.Telegram.WebApp : null;
const app = document.getElementById('app');

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function render(html){ app.innerHTML = html; }

function showError(msg, hint){
  render(`<div class="center"><div class="err" style="font-size:1.4rem;margin-bottom:8px">⚠️</div>
    <div style="margin-bottom:6px">${esc(msg)}</div>
    ${hint ? `<div class="muted">${esc(hint)}</div>` : ''}</div>`);
}

async function load(){
  if (!tg || !tg.initData) {
    showError('Откройте кабинет через бота', 'Эта страница работает только внутри Telegram.');
    return;
  }
  tg.ready();
  tg.expand();
  try {
    const res = await fetch(BACKEND + '?initData=' + encodeURIComponent(tg.initData) + '&t=' + Date.now());
    const data = await res.json();

    if (!data.ok) {
      if (data.error === 'not_linked') {
        showError('Вы ещё не привязаны', 'Вернитесь в бота и поделитесь номером телефона.');
      } else if (data.error === 'auth') {
        showError('Не удалось подтвердить вход', 'Попробуйте открыть кабинет заново через бота.');
      } else {
        showError('Ошибка', data.error || 'неизвестно');
      }
      return;
    }

    render(`
      <div class="header"><span class="logo">♟</span><h1>Rep Chess Education</h1></div>
      <div class="card">
        <h2>Привет, ${esc(data.name)}!</h2>
        <div class="muted">📧 ${esc(data.email)}</div>
      </div>
      <div class="card">
        <h2>Баланс занятий</h2>
        <div class="muted">Скоро здесь появятся ваши занятия: сколько осталось, история и расписание.</div>
      </div>
    `);
  } catch (e) {
    showError('Ошибка сети', e.message);
  }
}

load();
</script>
</body>
</html>
