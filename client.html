<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Rep Chess Education — Личный кабинет</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #0f1117);
    --card: var(--tg-theme-secondary-bg-color, #1a1d27);
    --text: var(--tg-theme-text-color, #e8e8e8);
    --hint: var(--tg-theme-hint-color, #8a8f9c);
    --accent: var(--tg-theme-button-color, #C94A42);
    --accent-text: var(--tg-theme-button-text-color, #ffffff);
    --green: #22c55e; --orange: #f97316; --blue: #4a9eff; --purple: #a855f7; --red: #ef4444;
    --border: rgba(127,127,127,.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, system-ui, 'Segoe UI', sans-serif;
    min-height: 100vh; font-size: 15px;
    padding: 14px 14px calc(74px + env(safe-area-inset-bottom));
  }
  .header { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .header .logo { width:38px; height:38px; border-radius:11px; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:1.3rem; flex-shrink:0; }
  .header h1 { font-size:1.05rem; font-weight:800; line-height:1.2; }
  .header .sub { font-size:.75rem; color:var(--hint); }

  .card { background:var(--card); border-radius:16px; padding:15px 16px; margin-bottom:12px; }
  .card h2 { font-size:.78rem; font-weight:700; margin-bottom:10px; color:var(--hint); text-transform:uppercase; letter-spacing:.05em; }
  .muted { color:var(--hint); font-size:.85rem; }

  /* Герой-баланс */
  .hero { text-align:center; padding:20px 16px 16px; }
  .hero .big { font-size:3rem; font-weight:800; color:var(--accent); line-height:1; }
  .hero .cap { font-size:.8rem; color:var(--hint); margin-bottom:4px; }
  .hero .sub2 { display:flex; justify-content:center; gap:14px; margin-top:8px; font-size:.8rem; color:var(--hint); }
  .cat-chips { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin-top:12px; }
  .cat-chip { font-size:.75rem; padding:4px 10px; border-radius:20px; background:rgba(127,127,127,.1); border:1px solid var(--border); }

  .rows { }
  .row { display:flex; justify-content:space-between; align-items:center; gap:10px; padding:10px 0; border-top:1px solid var(--border); font-size:.88rem; }
  .row:first-child { border-top:none; }
  .row .exp { opacity:.5; }
  .badge { font-size:.73rem; white-space:nowrap; padding:2px 8px; border-radius:10px; }
  .b-done { color:var(--green); background:rgba(34,197,94,.1); }
  .b-absent { color:var(--orange); background:rgba(249,115,22,.1); }
  .b-plan { color:var(--blue); background:rgba(74,158,255,.1); }

  .btn { border:none; border-radius:10px; padding:9px 14px; font-weight:700; font-size:.82rem; cursor:pointer; white-space:nowrap; }
  .btn-acc { background:var(--accent); color:var(--accent-text); }
  .btn-ghost { background:transparent; color:var(--hint); border:1px solid var(--border); }
  .btn-full { width:100%; padding:13px; font-size:.95rem; border-radius:12px; }
  .btn:disabled { opacity:.5; }

  /* Вкладки снизу */
  .tabbar { position:fixed; left:0; right:0; bottom:0; display:flex; background:var(--card);
    border-top:1px solid var(--border); padding:6px 8px calc(6px + env(safe-area-inset-bottom)); z-index:50; }
  .tab { flex:1; text-align:center; padding:6px 2px; border-radius:12px; cursor:pointer; color:var(--hint); }
  .tab .ico { font-size:1.25rem; line-height:1.2; }
  .tab .lbl { font-size:.68rem; font-weight:700; }
  .tab.on { color:var(--accent); background:rgba(201,74,66,.1); }

  /* Запись: дни и слоты */
  .day-strip { display:flex; gap:8px; overflow-x:auto; padding:2px 0 8px; -webkit-overflow-scrolling:touch; }
  .day-chip { flex-shrink:0; text-align:center; padding:8px 12px; border-radius:12px; border:1px solid var(--border);
    background:rgba(127,127,127,.06); cursor:pointer; min-width:58px; }
  .day-chip .dw { font-size:.68rem; color:var(--hint); font-weight:700; }
  .day-chip .dt { font-size:.85rem; font-weight:800; }
  .day-chip.on { border-color:var(--accent); background:rgba(201,74,66,.12); }
  .day-chip.on .dw, .day-chip.on .dt { color:var(--accent); }
  .slot-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:10px; }
  .slot { text-align:center; padding:10px 4px; border-radius:10px; border:1px solid var(--border);
    background:rgba(127,127,127,.06); cursor:pointer; font-weight:700; font-size:.85rem; }
  .slot .sf { display:block; font-size:.62rem; font-weight:400; color:var(--hint); margin-top:2px; }
  .fmt-toggle { display:flex; gap:8px; margin-bottom:10px; }
  .fmt-btn { flex:1; text-align:center; padding:9px; border-radius:10px; border:1px solid var(--border);
    background:rgba(127,127,127,.06); cursor:pointer; font-size:.82rem; font-weight:700; color:var(--hint); }
  .fmt-btn.on { border-color:var(--accent); color:var(--accent); background:rgba(201,74,66,.1); }

  .inp { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:10px;
    padding:11px 12px; color:var(--text); font-size:.95rem; }

  /* Расписание недели */
  .sd-img { width:100%; border-radius:12px; margin:2px 0 8px; display:block; }
  .sd-day { font-weight:800; font-size:.95rem; margin:16px 0 4px; display:flex; align-items:center; gap:8px; }
  .sd-today { font-size:.65rem; font-weight:700; color:var(--accent); background:rgba(201,74,66,.12);
    border:1px solid rgba(201,74,66,.3); padding:1px 8px; border-radius:10px; }
  .sd-item { display:flex; gap:10px; padding:8px 0; border-top:1px solid var(--border); }
  .sd-time { font-weight:800; font-size:.88rem; flex-shrink:0; width:46px; padding-top:1px; }
  .sd-body { flex:1; min-width:0; }
  .sd-title { display:block; font-size:.9rem; line-height:1.35; font-weight:600; color:var(--text); text-decoration:none; }
  a.sd-title { color:var(--blue); }
  .sd-ticket { margin-top:6px; background:rgba(201,74,66,.12); border:1px solid rgba(201,74,66,.35);
    color:var(--accent); border-radius:8px; padding:4px 11px; font-size:.75rem; font-weight:700; cursor:pointer; }
  .sd-note { margin-top:14px; font-size:.78rem; color:var(--hint); background:rgba(127,127,127,.07);
    border:1px solid var(--border); border-radius:10px; padding:9px 11px; line-height:1.4; }

  /* Профиль */
  .p-row { margin-bottom:11px; }
  .p-lbl { font-size:.7rem; color:var(--hint); font-weight:700; margin-bottom:4px; text-transform:uppercase; letter-spacing:.05em; }
  .center { text-align:center; padding:44px 16px; }
  .spinner { width:28px; height:28px; border:3px solid var(--card); border-top-color:var(--accent);
    border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 14px; }
  .spinner.sm { width:20px; height:20px; margin:14px auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .err { color:var(--red); }
  .msg-ok { color:var(--green); font-size:.85rem; margin-top:8px; }
  .msg-err { color:var(--orange); font-size:.85rem; margin-top:8px; }
</style>
</head>
<body>
  <div id="app">
    <div class="center"><div class="spinner"></div><div class="muted">Загружаю ваш кабинет…</div></div>
  </div>

<script>
const BACKEND = 'https://script.google.com/macros/s/AKfycbymBB1BkAnqLi_uLt9M1rVJ-rFGa0fK225hw-HvlhxgxsbVO4K5gka44FTFzYLss-tVZg/exec';
const tg = window.Telegram ? window.Telegram.WebApp : null;
const app = document.getElementById('app');

// Политика обработки персональных данных (страница на сайте). Пусто — текст согласия без ссылки.
const POLICY_URL = '';

// Кнопки покупки на главной: [подпись, ссылка на страницу оплаты]. Пустой список — карточка скрыта.
const BUY_LINKS = [
  // ['👤 Индивидуальные занятия', 'https://...'],
  // ['👥 Групповые занятия', 'https://...'],
];

let data = null;          // основной payload кабинета
let activeTab = 'home';   // home | book | events | history
let slotsData = null;     // кэш ответа indivSlots
let bookDay = null;       // выбранная дата записи
let bookFmt = null;       // выбранный формат ('offline'|'online')

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function fmtRub(n){return String(Math.round(n||0)).replace(/\B(?=(\d{3})+(?!\d))/g,' ')+' ₽';}
function confirmTg(text, cb){ if (tg && tg.showConfirm) tg.showConfirm(text, ok => { if (ok) cb(); }); else if (confirm(text)) cb(); }
function api(params){ return fetch(BACKEND + '?' + params + '&initData=' + encodeURIComponent(tg.initData) + '&t=' + Date.now()).then(r => r.json()); }

const ERRS = {
  full:'Мест больше нет', already:'Вы уже записаны', past:'Запись на это занятие закрыта',
  too_late:'Отменить можно только до дня занятия — напишите администратору',
  no_group_pack:'Нужен активный групповой пакет', no_balance:'Занятия на балансе закончились',
  closed:'Запись закрыта', not_found:'Не найдено', not_joined:'Вы не записаны',
  no_trainer:'За вами пока не закреплён тренер — напишите администратору',
  no_schedule:'Тренер ещё не заполнил график — попробуйте позже',
  slot_taken:'Это время только что заняли — выберите другое', slot_gone:'Это время уже недоступно',
  format_mismatch:'Этот слот доступен в другом формате', no_indiv_pack:'Нужен активный индивидуальный пакет',
  bad_date:'Эта дата недоступна для записи', bad_slot:'Некорректное время',
  not_yours:'Это не ваша запись', not_cancellable:'Это занятие нельзя отменить',
  used:'Этот код уже был активирован', bad_code:'Некорректный код',
  not_linked:'Сначала поделитесь номером телефона в боте',
  bad_fio:'Укажите ФИО', bad_email:'Проверьте адрес почты',
  email_locked:'Почта подтверждена администратором — для изменения напишите нам',
  auth:'Откройте кабинет заново через бота', server:'Ошибка сервера, попробуйте позже'
};
function errText(d){ return ERRS[d.error] || d.error || 'ошибка'; }

function showError(msg, hint){
  app.innerHTML = `<div class="center"><div class="err" style="font-size:1.4rem;margin-bottom:8px">⚠️</div>
    <div style="margin-bottom:6px">${esc(msg)}</div>${hint?`<div class="muted">${esc(hint)}</div>`:''}</div>`;
}

async function load(){
  if (!tg || !tg.initData) { showError('Откройте кабинет через бота', 'Эта страница работает только внутри Telegram.'); return; }
  tg.ready(); tg.expand();
  try {
    const d = await api('');
    if (!d.ok) {
      if (d.error === 'not_linked') showError('Вы ещё не привязаны', 'Вернитесь в бота и поделитесь номером телефона.');
      else if (d.error === 'auth') showError('Не удалось подтвердить вход', 'Откройте кабинет заново через бота.');
      else showError('Ошибка', errText(d));
      return;
    }
    data = d;
    slotsData = null; bookDay = null;   // данные обновились — слоты перезапросим
    renderShell();
  } catch (e) { showError('Ошибка сети', e.message); }
}

function renderShell(){
  app.innerHTML = `
    <div class="header">
      <div class="logo">♟</div>
      <div><h1>Rep Chess Education</h1><div class="sub">${esc(data.name)}</div></div>
    </div>
    <div id="tab-content"></div>
    <div class="tabbar">
      ${[['home','🏠','Главная'],['book','📅','Запись'],['events','🎪','Ивенты'],['history','📖','История'],['profile','👤','Профиль']].map(t =>
        `<div class="tab ${activeTab===t[0]?'on':''}" onclick="showTab('${t[0]}')"><div class="ico">${t[1]}</div><div class="lbl">${t[2]}</div></div>`).join('')}
    </div>`;
  renderTab();
}

function showTab(name){
  activeTab = name;
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('on', ['home','book','events','history','profile'][i] === name));
  renderTab();
  window.scrollTo(0, 0);
}

function renderTab(){
  const el = document.getElementById('tab-content');
  if (!el) return;
  if (activeTab === 'home') el.innerHTML = viewHome();
  else if (activeTab === 'book') {
    el.innerHTML = viewBook();
    // слоты кэшируются: повторное открытие вкладки рисует из кэша без запроса
    if (slotsData) renderIndivBook(); else loadSlots();
  }
  else if (activeTab === 'events') el.innerHTML = viewEvents();
  else if (activeTab === 'profile') el.innerHTML = viewProfile();
  else el.innerHTML = viewHistory();
}

// ══════════ ГЛАВНАЯ ══════════
function viewHome(){
  const remaining = data.remaining ?? data.purchased ?? 0;
  const cats = Object.keys(data.byCat || {}).map(k => `<span class="cat-chip">${esc(k)} · <b>${data.byCat[k]}</b></span>`).join('');
  const upcoming = (data.upcoming || []).map(u => `
    <div class="row">
      <span>📅 <b>${esc(u.date)}</b>${u.time ? ' · ' + esc(u.time) : ''}
        <div class="muted">${esc(u.type)}${u.trainerName ? ' · ' + esc(u.trainerName) : ''}</div></span>
      ${u.cancellable && u.id ? `<button class="btn btn-ghost" onclick="cancelIndiv('${esc(u.id)}','${esc(u.date)}')">Отменить</button>` : ''}
    </div>`).join('') || '<div class="muted">нет запланированных занятий</div>';

  return `
    <div class="card hero">
      <div class="cap">Осталось занятий</div>
      <div class="big">${remaining}</div>
      <div class="sub2"><span>куплено: ${data.purchased ?? 0}</span><span>проведено: ${data.used ?? 0}</span></div>
      ${data.nextExpiry ? `<div class="muted" style="margin-top:6px">действуют до ${esc(data.nextExpiry)}</div>` : ''}
      ${cats ? `<div class="cat-chips">${cats}</div>` : ''}
      ${remaining > 0 ? `<button class="btn btn-acc btn-full" style="margin-top:14px" onclick="showTab('book')">📅 Записаться на занятие</button>` : ''}
    </div>
    <div class="card"><h2>Ближайшие занятия</h2><div class="rows" id="upcoming-rows">${upcoming}</div><div id="up-msg"></div></div>
    ${!data.profile ? `<div class="card" style="cursor:pointer" onclick="showTab('profile')">
      <div style="display:flex;align-items:center;gap:12px">
        <span style="font-size:1.5rem">👤</span>
        <span style="flex:1;min-width:0"><b>Расскажите о себе</b>
          <div class="muted">поможем подбирать занятия под ваш уровень</div></span>
        <span style="color:var(--accent);font-weight:800;font-size:1.1rem">→</span>
      </div></div>` : ''}
    ${BUY_LINKS.length ? `<div class="card"><h2>🛒 Купить занятия</h2>
      <div style="display:flex;flex-direction:column;gap:8px">${BUY_LINKS.map(b =>
        `<button class="btn btn-acc btn-full" onclick="openLink('${esc(b[1])}')">${esc(b[0])}</button>`).join('')}</div>
    </div>` : ''}
    <div class="card"><h2>🎁 Есть сертификат?</h2>
      <div class="muted" style="margin-bottom:8px">Введите код с сертификата — занятия сразу появятся в кабинете.</div>
      <div style="display:flex;gap:8px">
        <input id="cert-inp" class="inp" style="flex:1;min-width:0;text-transform:uppercase" placeholder="REP-XXXX-XX" autocapitalize="characters" autocomplete="off">
        <button id="cert-btn" class="btn btn-acc" onclick="redeemCert()">OK</button>
      </div>
      <div id="cert-msg" class="muted" style="margin-top:8px"></div>
    </div>`;
}

// ══════════ ЗАПИСЬ ══════════
function viewBook(){
  return `
    <div class="card"><h2>👤 Индивидуальное занятие</h2><div id="indiv-book">
      <div class="spinner sm"></div><div class="muted" style="text-align:center">загружаю свободное время…</div>
    </div></div>
    <div class="card"><h2>👥 Групповые занятия</h2><div class="rows">${viewGroups()}</div><div id="grp-join-msg"></div></div>`;
}

function viewGroups(){
  const remaining = data.remaining ?? 0;
  const canGroup = f => ((data.byCat || {})['Групп. ' + (f === 'online' ? 'онлайн' : 'офлайн')] > 0) && remaining > 0;
  return (data.openGroups || []).map(g => {
    const fmtIcon = g.format === 'online' ? '💻 онлайн' : '📍 офлайн';
    const spots = g.max ? `${g.count}/${g.max}` : `${g.count}`;
    const full = g.max && g.count >= g.max;
    let action;
    if (g.joined) action = `<button class="btn btn-ghost" onclick="leaveGroup('${esc(g.id)}')">✓ Записан · отменить</button>`;
    else if (full) action = `<span class="muted">мест нет</span>`;
    else if (!canGroup(g.format)) action = `<span class="muted">нужен групповой пакет</span>`;
    else action = `<button class="btn btn-acc" onclick="joinGroup('${esc(g.id)}')">Записаться</button>`;
    return `<div class="row"><span>📅 <b>${esc(g.date)}</b>${g.time ? ' · ' + esc(g.time) : ''} · ${fmtIcon}
      <div class="muted">${esc(g.venue || '')}${g.trainerName ? ' · ' + esc(g.trainerName) : ''} · ${spots} чел.</div></span>${action}</div>`;
  }).join('') || '<div class="muted">сейчас открытых занятий нет</div>';
}

async function loadSlots(){
  try {
    const d = await api('action=indivSlots');
    slotsData = d;
    if (d.ok && d.days.length) {
      bookDay = d.days[0].date;
      if (!bookFmt) bookFmt = d.canOffline ? 'offline' : 'online';
    }
  } catch(e) { slotsData = { ok: false, error: 'server' }; }
  renderIndivBook();
}

function renderIndivBook(){
  const el = document.getElementById('indiv-book');
  if (!el) return;
  const d = slotsData;
  if (!d) return;
  if (!d.ok) { el.innerHTML = `<div class="muted">⚠️ ${esc(errText(d))}</div>`; return; }
  if (!d.canOffline && !d.canOnline) { el.innerHTML = `<div class="muted">Для записи нужен активный пакет индивидуальных занятий.</div>`; return; }
  if (d.remaining < 1) { el.innerHTML = `<div class="muted">Занятия на балансе закончились — продлите пакет, и запись откроется.</div>`; return; }
  if (!d.days.length) { el.innerHTML = `<div class="muted">У тренера ${esc(d.trainer || '')} нет свободных слотов на ближайшие 2 недели.</div>`; return; }

  const bothPacks = d.canOffline && d.canOnline;
  const day = d.days.find(x => x.date === bookDay) || d.days[0];
  const fmtMark = { both: '', offline: '📍', online: '💻' };
  const slots = day.slots.filter(s => s.format === 'both' || s.format === bookFmt);

  el.innerHTML = `
    <div class="muted" style="margin-bottom:10px">Тренер: <b style="color:var(--text)">${esc(d.trainer || '—')}</b></div>
    ${bothPacks ? `<div class="fmt-toggle">
      <div class="fmt-btn ${bookFmt==='offline'?'on':''}" onclick="setBookFmt('offline')">📍 Офлайн</div>
      <div class="fmt-btn ${bookFmt==='online'?'on':''}" onclick="setBookFmt('online')">💻 Онлайн</div>
    </div>` : `<div class="muted" style="margin-bottom:10px">Формат: ${bookFmt==='online'?'💻 онлайн':'📍 офлайн'} (по вашему пакету)</div>`}
    <div class="day-strip">${d.days.map(x =>
      `<div class="day-chip ${x.date===day.date?'on':''}" onclick="setBookDay('${x.date}')"><div class="dw">${esc(x.dow)}</div><div class="dt">${esc(x.label)}</div></div>`).join('')}</div>
    ${slots.length ? `<div class="slot-grid">${slots.map(s =>
      `<div class="slot" onclick="bookSlot('${day.date}','${s.time}')">${s.time}<span class="sf">${fmtMark[s.format]||''}${s.format==='both'?'':''}</span></div>`).join('')}</div>`
      : `<div class="muted" style="margin-top:10px">в этот день нет слотов под выбранный формат</div>`}
    <div id="book-msg"></div>`;
}

function setBookDay(dt){ bookDay = dt; renderIndivBook(); }
function setBookFmt(f){ bookFmt = f; renderIndivBook(); }

function bookSlot(date, time){
  const dRu = date.split('-').reverse().slice(0,2).join('.');
  confirmTg(`Записаться на ${dRu} в ${time} (${bookFmt==='online'?'онлайн':'офлайн'})?`, async () => {
    const msg = document.getElementById('book-msg');
    if (msg) msg.innerHTML = '<div class="muted" style="margin-top:8px">Записываю…</div>';
    try {
      const d = await api('action=bookIndiv&date=' + date + '&time=' + encodeURIComponent(time) + '&format=' + bookFmt);
      if (d.ok) {
        if (msg) msg.innerHTML = '<div class="msg-ok">✅ Вы записаны! Обновляю кабинет…</div>';
        setTimeout(load, 1200);
      } else {
        if (msg) msg.innerHTML = `<div class="msg-err">⚠️ ${esc(errText(d))}</div>`;
        if (d.error === 'slot_taken' || d.error === 'slot_gone') { slotsData = null; loadSlots(); }
      }
    } catch(e) { if (msg) msg.innerHTML = '<div class="msg-err">⚠️ Ошибка сети</div>'; }
  });
}

function cancelIndiv(id, dateRu){
  confirmTg(`Отменить занятие ${dateRu}?`, async () => {
    const msg = document.getElementById('up-msg');
    if (msg) msg.innerHTML = '<div class="muted" style="margin-top:8px">Отменяю…</div>';
    try {
      const d = await api('action=cancelIndiv&lessonId=' + encodeURIComponent(id));
      if (d.ok) { if (msg) msg.innerHTML = '<div class="msg-ok">↩️ Запись отменена. Обновляю…</div>'; setTimeout(load, 1200); }
      else if (msg) msg.innerHTML = `<div class="msg-err">⚠️ ${esc(errText(d))}</div>`;
    } catch(e) { if (msg) msg.innerHTML = '<div class="msg-err">⚠️ Ошибка сети</div>'; }
  });
}

// ══════════ ИВЕНТЫ (расписание недели из канала + доп. анонсы) ══════════
function viewEvents(){
  const s = data.schedule;
  let schedHtml = '';
  if (s && s.days && s.days.length) {
    const d0 = new Date();
    const todayIso = d0.getFullYear() + '-' + String(d0.getMonth()+1).padStart(2,'0') + '-' + String(d0.getDate()).padStart(2,'0');
    schedHtml = `<div class="card"><h2>📅 Расписание недели</h2>
      ${s.imgUrl ? `<img class="sd-img" src="${esc(s.imgUrl)}" alt="Афиша недели" loading="lazy">` : ''}
      ${s.days.map(d => {
        const past = d.date < todayIso, isToday = d.date === todayIso;
        return `<div${past ? ' style="opacity:.45"' : ''}>
          <div class="sd-day">${esc(d.label)}${isToday ? '<span class="sd-today">сегодня</span>' : ''}</div>
          ${d.items.map(it => `
            <div class="sd-item">
              <div class="sd-time">${esc(it.time)}</div>
              <div class="sd-body">
                ${it.url
                  ? `<a class="sd-title" href="#" onclick="openLink('${esc(it.url)}');return false">${esc(it.title)} ›</a>`
                  : `<div class="sd-title">${esc(it.title)}</div>`}
                ${it.ticketUrl ? `<button class="sd-ticket" onclick="openLink('${esc(it.ticketUrl)}')">${it.ticketLabel === 'Регистрация' ? '✍️ Регистрация' : '🎟 Билеты'}</button>` : ''}
              </div>
            </div>`).join('')}
        </div>`;
      }).join('')}
      ${s.note ? `<div class="sd-note"${s.note.url ? ` onclick="openLink('${esc(s.note.url)}')" style="cursor:pointer"` : ''}>🎁 ${esc(s.note.text)}${s.note.url ? ' <b style="color:var(--blue)">›</b>' : ''}</div>` : ''}
      ${s.postUrl ? `<button class="btn btn-ghost btn-full" style="margin-top:12px" onclick="openLink('${esc(s.postUrl)}')">Открыть пост в канале</button>` : ''}
    </div>`;
  }
  const evs = (data.events || []).map(v => `
    <div class="row"><span>📅 <b>${esc(v.date)}</b>${v.dow ? ' (' + esc(v.dow) + ')' : ''}${v.time ? ' · ' + esc(v.time) : ''}
      <div style="font-weight:700;margin-top:2px">${esc(v.title)}</div>
      ${v.desc ? `<div class="muted">${esc(v.desc)}</div>` : ''}</span>
      ${v.ticketUrl ? `<button class="btn btn-acc" onclick="openLink('${esc(v.ticketUrl)}')">🎟 Билеты</button>` : ''}
    </div>`).join('');
  const evsHtml = evs ? `<div class="card"><h2>🎪 ${schedHtml ? 'Доп. анонсы' : 'Афиша Rep Chess'}</h2><div class="rows">${evs}</div></div>` : '';
  return schedHtml || evsHtml
    ? schedHtml + evsHtml
    : `<div class="card"><h2>🎪 Афиша Rep Chess</h2><div class="muted">Пока нет анонсов — загляните позже.</div></div>`;
}

function openLink(url){
  if (!/^https?:\/\//i.test(url)) return;
  // t.me-ссылки открываем внутри Telegram, остальные — во внешнем браузере
  if (tg && tg.openTelegramLink && /^https:\/\/t\.me\//i.test(url)) { tg.openTelegramLink(url); return; }
  if (tg && tg.openLink) tg.openLink(url); else window.open(url, '_blank');
}

// ══════════ ПРОФИЛЬ ══════════
let profGender = '';
function viewProfile(){
  const p = data.profile || {};
  if (!profGender) profGender = p.gender || '';
  // Почта, совпадающая с привязкой кабинета, подтверждена — менять её может только администратор
  const emailVerified = !!(p.email && data.email && p.email === data.email);
  return `
    <div class="card"><h2>👤 Мой профиль</h2>
      <div class="muted" style="margin-bottom:14px">Анкета помогает подбирать занятия под ваш уровень. Почта дополнительно свяжет с кабинетом покупки, сделанные не с вашего номера.</div>
      <div class="p-row"><div class="p-lbl">ФИО</div><input id="pf-fio" class="inp" value="${esc(p.fio||'')}" placeholder="Иванов Иван" autocomplete="name"></div>
      <div class="p-row"><div class="p-lbl">Почта</div>
        <input id="pf-email" class="inp" type="email" value="${esc(p.email||'')}" placeholder="you@mail.ru" autocomplete="email" ${emailVerified ? 'disabled style="opacity:.6"' : ''}>
        ${emailVerified ? '<div style="font-size:.72rem;color:var(--green);margin-top:4px">✅ подтверждена администратором — для изменения напишите нам</div>' : ''}
      </div>
      <div style="display:flex;gap:8px">
        <div class="p-row" style="flex:1"><div class="p-lbl">Возраст</div><input id="pf-age" class="inp" type="number" min="3" max="99" value="${esc(p.age||'')}"></div>
        <div class="p-row" style="flex:2"><div class="p-lbl">Город</div><input id="pf-city" class="inp" value="${esc(p.city||'')}" placeholder="Москва"></div>
      </div>
      <div class="p-row"><div class="p-lbl">Пол</div>
        <div class="fmt-toggle" style="margin-bottom:0">
          <div class="fmt-btn pf-g ${profGender==='м'?'on':''}" data-g="м" onclick="setGender('м')">М</div>
          <div class="fmt-btn pf-g ${profGender==='ж'?'on':''}" data-g="ж" onclick="setGender('ж')">Ж</div>
        </div>
      </div>
      <div class="p-row"><div class="p-lbl">Уровень игры</div><input id="pf-level" class="inp" value="${esc(p.level||'')}" placeholder="например: 1400 lichess / новичок"></div>
      <button id="pf-save" class="btn btn-acc btn-full" style="margin-top:4px" onclick="saveProfile()">Сохранить</button>
      <div id="pf-msg" class="muted" style="margin-top:8px"></div>
      <div class="muted" style="margin-top:10px;font-size:.7rem;line-height:1.45">Нажимая «Сохранить», вы даёте согласие на обработку указанных персональных данных${POLICY_URL ? ` в соответствии с <a href="#" onclick="openLink('${esc(POLICY_URL)}');return false" style="color:var(--hint);text-decoration:underline">политикой конфиденциальности</a>` : ''}.</div>
    </div>`;
}

function setGender(g){
  profGender = (profGender === g) ? '' : g;
  document.querySelectorAll('.pf-g').forEach(el => el.classList.toggle('on', el.dataset.g === profGender));
}

async function saveProfile(){
  const val = id => (document.getElementById(id).value || '').trim();
  const msg = document.getElementById('pf-msg');
  msg.style.color = '';
  if (!val('pf-fio')) { msg.textContent = '⚠️ Укажите ФИО'; return; }
  const btn = document.getElementById('pf-save');
  btn.disabled = true;
  msg.textContent = 'Сохраняю…';
  try {
    const d = await api('action=saveProfile'
      + '&fio=' + encodeURIComponent(val('pf-fio'))
      + '&pemail=' + encodeURIComponent(val('pf-email'))
      + '&age=' + encodeURIComponent(val('pf-age'))
      + '&gender=' + encodeURIComponent(profGender)
      + '&city=' + encodeURIComponent(val('pf-city'))
      + '&level=' + encodeURIComponent(val('pf-level')));
    if (d.ok) {
      data.profile = d.profile;
      msg.style.color = 'var(--green)';
      msg.textContent = d.emailPending
        ? '✅ Сохранено! На эту почту нашлись покупки — администратор проверит и привяжет их.'
        : '✅ Сохранено!';
    } else msg.textContent = '⚠️ ' + errText(d);
  } catch(e) { msg.textContent = '⚠️ Ошибка сети'; }
  btn.disabled = false;
}

// ══════════ ИСТОРИЯ ══════════
function viewHistory(){
  const lessonHist = (data.lessonHistory || []).map(h => {
    const st = h.status === 'absent' ? `<span class="badge b-absent">пропуск</span>` : `<span class="badge b-done">проведено</span>`;
    return `<div class="row"><span><b>${esc(h.date)}</b>${h.time ? ' · ' + esc(h.time) : ''} · ${esc(h.type)}
      ${h.notes ? `<div class="muted">${esc(h.notes)}</div>` : ''}</span>${st}</div>`;
  }).join('') || '<div class="muted">занятий пока не было</div>';

  const purch = (data.purchaseHistory || []).map(h =>
    `<div class="row"><span class="${h.expired?'exp':''}"><b>${esc(h.date)}</b> · ${esc(h.label)}${h.expired?' · истёк':''}</span>
     <span class="muted">${fmtRub(h.price)}</span></div>`).join('') || '<div class="muted">покупок пока нет</div>';

  return `
    <div class="card"><h2>История занятий</h2><div class="rows">${lessonHist}</div></div>
    <div class="card"><h2>История покупок</h2><div class="rows">${purch}</div></div>`;
}

// ══════════ ДЕЙСТВИЯ: группы и сертификат ══════════
async function _groupAction(action, id) {
  const msg = document.getElementById('grp-join-msg');
  if (msg) { msg.innerHTML = '<div class="muted" style="margin-top:8px">Секундочку…</div>'; }
  try {
    const d = await api('action=' + action + '&groupId=' + encodeURIComponent(id));
    if (d.ok) {
      if (msg) msg.innerHTML = `<div class="msg-ok">${action === 'joinGroup' ? '✅ Вы записаны! Обновляю…' : '↩️ Запись отменена. Обновляю…'}</div>`;
      setTimeout(load, 1200);
      return;
    }
    if (msg) msg.innerHTML = `<div class="msg-err">⚠️ ${esc(errText(d))}${d.need ? ' (' + esc(d.need) + ')' : ''}</div>`;
  } catch(e) { if (msg) msg.innerHTML = '<div class="msg-err">⚠️ Ошибка сети</div>'; }
}
function joinGroup(id) { _groupAction('joinGroup', id); }
function leaveGroup(id) { confirmTg('Отменить запись на групповое занятие?', () => _groupAction('leaveGroup', id)); }

async function redeemCert(){
  const inp = document.getElementById('cert-inp');
  const msg = document.getElementById('cert-msg');
  const btn = document.getElementById('cert-btn');
  const code = (inp.value || '').toUpperCase().replace(/[^A-Z0-9-]/g, '');
  if (!code) { msg.textContent = 'Введите код с сертификата'; return; }
  btn.disabled = true;
  msg.style.color = '';
  msg.textContent = 'Проверяю код…';
  try {
    const d = await api('action=redeemCert&code=' + encodeURIComponent(code));
    if (d.ok) {
      msg.style.color = 'var(--green)';
      msg.textContent = '✅ Сертификат активирован: ' + (d.label || '') + '. Обновляю кабинет…';
      setTimeout(load, 1500);
      return;
    }
    msg.textContent = '⚠️ ' + errText(d);
  } catch(e) { msg.textContent = '⚠️ Ошибка сети, попробуйте ещё раз'; }
  btn.disabled = false;
}

load();
</script>
</body>
