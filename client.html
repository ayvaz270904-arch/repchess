<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Rep Chess Education — Личный кабинет</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #0f1117);
    --card: var(--tg-theme-secondary-bg-color, #1a1d27);
    --text: var(--tg-theme-text-color, #e8e8e8);
    --hint: var(--tg-theme-hint-color, #8a8f9c);
    --accent: var(--tg-theme-button-color, #C94A42);
    --accent-text: var(--tg-theme-button-text-color, #ffffff);
    --green: #22c55e; --orange: #f97316;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, system-ui, 'Segoe UI', sans-serif;
    padding: 16px; min-height: 100vh; font-size: 15px;
  }
  .header { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
  .header .logo { font-size: 1.5rem; }
  .header h1 { font-size: 1.15rem; font-weight: 800; }
  .card { background: var(--card); border-radius: 14px; padding: 16px 18px; margin-bottom: 12px; }
  .card h2 { font-size: .95rem; font-weight: 700; margin-bottom: 10px; }
  .muted { color: var(--hint); font-size: .85rem; }
  .balance { text-align: center; }
  .big { font-size: 2.8rem; font-weight: 800; color: var(--accent); line-height: 1.1; margin: 2px 0; }
  .sub2 { display:flex; justify-content:center; gap:16px; margin-top:6px; font-size:.82rem; color:var(--hint); }
  .rows { margin-top: 10px; }
  .row { display: flex; justify-content: space-between; align-items: flex-start; gap:10px; padding: 8px 0; border-top: 1px solid rgba(127,127,127,.15); font-size: .88rem; }
  .row:first-child { border-top: none; }
  .row .exp { opacity: .5; }
  .badge { font-size:.75rem; white-space:nowrap; }
  .b-done { color: var(--green); }
  .b-absent { color: var(--orange); }
  .center { text-align: center; padding: 40px 16px; }
  .spinner { width: 28px; height: 28px; border: 3px solid var(--card); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .err { color: #ef4444; }
</style>
</head>
<body>
  <div id="app">
    <div class="center"><div class="spinner"></div><div class="muted">Загружаю ваш кабинет…</div></div>
  </div>

<script>
const BACKEND = 'https://script.google.com/macros/s/AKfycbymBB1BkAnqLi_uLt9M1rVJ-rFGa0fK225hw-HvlhxgxsbVO4K5gka44FTFzYLss-tVZg/exec';
const tg = window.Telegram ? window.Telegram.WebApp : null;
const app = document.getElementById('app');

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtRub(n){return String(Math.round(n||0)).replace(/\B(?=(\d{3})+(?!\d))/g,' ')+' ₽';}
function render(html){ app.innerHTML = html; }
function showError(msg, hint){
  render(`<div class="center"><div class="err" style="font-size:1.4rem;margin-bottom:8px">⚠️</div>
    <div style="margin-bottom:6px">${esc(msg)}</div>${hint?`<div class="muted">${esc(hint)}</div>`:''}</div>`);
}

async function load(){
  if (!tg || !tg.initData) { showError('Откройте кабинет через бота', 'Эта страница работает только внутри Telegram.'); return; }
  tg.ready(); tg.expand();
  try {
    const res = await fetch(BACKEND + '?initData=' + encodeURIComponent(tg.initData) + '&t=' + Date.now());
    const data = await res.json();
    if (!data.ok) {
      if (data.error === 'not_linked') showError('Вы ещё не привязаны', 'Вернитесь в бота и поделитесь номером телефона.');
      else if (data.error === 'auth') showError('Не удалось подтвердить вход', 'Откройте кабинет заново через бота.');
      else showError('Ошибка', data.error || 'неизвестно');
      return;
    }

    const remaining = data.remaining ?? data.purchased ?? 0;

    const cats = Object.keys(data.byCat || {}).map(k =>
      `<div class="row"><span>${esc(k)}</span><b>${data.byCat[k]}</b></div>`).join('')
      || '<div class="muted">нет активных пакетов</div>';

    const upcoming = (data.upcoming || []).map(u =>
      `<div class="row"><span>📅 ${esc(u.date)} · ${esc(u.type)}</span></div>`).join('')
      || '<div class="muted">нет запланированных занятий</div>';

    const lessonHist = (data.lessonHistory || []).map(h => {
      const st = h.status === 'absent' ? `<span class="badge b-absent">пропуск</span>`
               : `<span class="badge b-done">проведено</span>`;
      return `<div class="row"><span>${esc(h.date)} · ${esc(h.type)}${h.notes?`<div class="muted">${esc(h.notes)}</div>`:''}</span>${st}</div>`;
    }).join('') || '<div class="muted">занятий пока не было</div>';

    const purch = (data.purchaseHistory || []).map(h =>
      `<div class="row"><span class="${h.expired?'exp':''}">${esc(h.date)} · ${esc(h.label)}${h.expired?' · истёк':''}</span>
       <span class="muted">${fmtRub(h.price)}</span></div>`).join('')
      || '<div class="muted">покупок пока нет</div>';

    // Открытые групповые занятия — самозапись
    const canGroup = f => ((data.byCat || {})['Групп. ' + (f === 'online' ? 'онлайн' : 'офлайн')] > 0) && remaining > 0;
    const btnStyle = 'border:none;border-radius:9px;padding:8px 12px;font-weight:700;font-size:.8rem;cursor:pointer;white-space:nowrap';
    const openGroups = (data.openGroups || []).map(g => {
      const fmtIcon = g.format === 'online' ? '💻 онлайн' : '📍 офлайн';
      const spots = g.max ? `${g.count}/${g.max}` : `${g.count}`;
      const full = g.max && g.count >= g.max;
      let action;
      if (g.joined) action = `<button onclick="leaveGroup('${esc(g.id)}')" style="${btnStyle};background:transparent;color:var(--hint);border:1px solid rgba(127,127,127,.35)">✓ Записан · отменить</button>`;
      else if (full) action = `<span class="muted">мест нет</span>`;
      else if (!canGroup(g.format)) action = `<span class="muted">нужен групповой пакет</span>`;
      else action = `<button onclick="joinGroup('${esc(g.id)}')" style="${btnStyle};background:var(--accent);color:var(--accent-text)">Записаться</button>`;
      return `<div class="row"><span>📅 ${esc(g.date)}${g.time ? ' · ' + esc(g.time) : ''} · ${fmtIcon}
        <div class="muted">${esc(g.venue || '')}${g.trainerName ? ' · ' + esc(g.trainerName) : ''} · ${spots} чел.</div></span>${action}</div>`;
    }).join('') || '<div class="muted">сейчас открытых занятий нет</div>';

    render(`
      <div class="header"><span class="logo">♟</span><h1>Rep Chess Education</h1></div>
      <div class="card"><h2>Привет, ${esc(data.name)}!</h2><div class="muted">📧 ${esc(data.email)}</div></div>
      <div class="card balance">
        <div class="muted">Осталось занятий</div>
        <div class="big">${remaining}</div>
        <div class="sub2"><span>куплено: ${data.purchased ?? 0}</span><span>проведено: ${data.used ?? 0}</span></div>
        ${data.nextExpiry ? `<div class="muted" style="margin-top:6px">действуют до ${esc(data.nextExpiry)}</div>` : ''}
        <div class="rows">${cats}</div>
      </div>
      <div class="card"><h2>Ближайшие занятия</h2><div class="rows">${upcoming}</div></div>
      <div class="card"><h2>👥 Запись на групповые</h2><div class="rows">${openGroups}</div><div id="grp-join-msg" class="muted" style="margin-top:6px"></div></div>
      <div class="card"><h2>История занятий</h2><div class="rows">${lessonHist}</div></div>
      <div class="card"><h2>История покупок</h2><div class="rows">${purch}</div></div>
      <div class="card"><h2>🎁 Есть сертификат?</h2>
        <div class="muted" style="margin-bottom:8px">Введите код с сертификата — занятия сразу появятся в кабинете.</div>
        <div style="display:flex;gap:8px">
          <input id="cert-inp" placeholder="REP-XXXX-XX" autocapitalize="characters" autocomplete="off"
            style="flex:1;min-width:0;background:var(--bg);border:1px solid rgba(127,127,127,.3);border-radius:10px;padding:10px 12px;color:var(--text);font-size:.95rem;text-transform:uppercase">
          <button id="cert-btn" onclick="redeemCert()"
            style="background:var(--accent);color:var(--accent-text);border:none;border-radius:10px;padding:10px 16px;font-weight:700;cursor:pointer">OK</button>
        </div>
        <div id="cert-msg" class="muted" style="margin-top:8px"></div>
      </div>
    `);
  } catch (e) { showError('Ошибка сети', e.message); }
}

// Активация сертификата по промокоду
async function redeemCert(){
  const inp = document.getElementById('cert-inp');
  const msg = document.getElementById('cert-msg');
  const btn = document.getElementById('cert-btn');
  const code = (inp.value || '').toUpperCase().replace(/[^A-Z0-9-]/g, '');
  if (!code) { msg.textContent = 'Введите код с сертификата'; return; }
  btn.disabled = true;
  msg.style.color = '';
  msg.textContent = 'Проверяю код…';
  try {
    const res = await fetch(BACKEND + '?action=redeemCert&code=' + encodeURIComponent(code)
      + '&initData=' + encodeURIComponent(tg.initData) + '&t=' + Date.now());
    const d = await res.json();
    if (d.ok) {
      msg.style.color = 'var(--green)';
      msg.textContent = '✅ Сертификат активирован: ' + (d.label || '') + '. Обновляю кабинет…';
      setTimeout(load, 1500);
      return;
    }
    const errs = {
      not_found: 'Код не найден — проверьте написание',
      used: 'Этот код уже был активирован',
      bad_code: 'Некорректный код',
      not_linked: 'Сначала поделитесь номером телефона в боте',
      auth: 'Откройте кабинет заново через бота',
      server: 'Ошибка сервера, попробуйте позже'
    };
    msg.textContent = '⚠️ ' + (errs[d.error] || d.error || 'ошибка');
  } catch(e) {
    msg.textContent = '⚠️ Ошибка сети, попробуйте ещё раз';
  }
  btn.disabled = false;
}

// Самозапись на групповые занятия / отмена записи
async function _groupAction(action, id) {
  const msg = document.getElementById('grp-join-msg');
  if (msg) { msg.style.color = ''; msg.textContent = 'Секундочку…'; }
  try {
    const res = await fetch(BACKEND + '?action=' + action + '&groupId=' + encodeURIComponent(id)
      + '&initData=' + encodeURIComponent(tg.initData) + '&t=' + Date.now());
    const d = await res.json();
    if (d.ok) {
      if (msg) {
        msg.style.color = 'var(--green)';
        msg.textContent = action === 'joinGroup' ? '✅ Вы записаны! Обновляю…' : '↩️ Запись отменена. Обновляю…';
      }
      setTimeout(load, 1200);
      return;
    }
    const errs = {
      full: 'Мест больше нет',
      already: 'Вы уже записаны',
      past: 'Запись на это занятие закрыта',
      too_late: 'Отменить можно только до дня занятия — напишите администратору',
      no_group_pack: 'Нужен активный групповой пакет' + (d.need ? ' (' + d.need + ')' : ''),
      no_balance: 'Занятия на балансе закончились',
      closed: 'Запись закрыта',
      not_found: 'Занятие не найдено',
      not_joined: 'Вы не записаны на это занятие',
      server: 'Ошибка сервера, попробуйте позже'
    };
    if (msg) msg.textContent = '⚠️ ' + (errs[d.error] || d.error || 'ошибка');
  } catch(e) { if (msg) msg.textContent = '⚠️ Ошибка сети'; }
}
function joinGroup(id) { _groupAction('joinGroup', id); }
function leaveGroup(id) { _groupAction('leaveGroup', id); }
load();
</script>
</body>
</html>
